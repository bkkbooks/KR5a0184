body:
  text: 他殺見殺隨喜噉食眾生犯者過去受鑊湯地獄罪第二戒者不得偷盜取非義財夜入人家晝窺園圃承其便勢遂起賊心或自偷教人偷見偷隨喜犯者過去受刀山劍樹地獄罪第三戒者不得心懷陰謀枉陷良善見人勝已便欲害他計較不平自求饒益他好我認我惡怨他犯者過去受爐炭地獄罪第四戒者不得口是心非鬬亂親戚談說三寶讒謗出家走作唇舌非笑良善誹謗聖教疑惑兩心說語不平勸生分别犯者過去受鐵犁耕舌地獄罪第五戒者不得違經慢道欺誘他人敗壞靈壇侵損常住隱沒功德踐踏福地犯者過去受剉碓剉身地獄罪第六戒者不得飲酒醉亂心神凶橫無度不存禮樂喧悖尊親呌喚神靈驚心損氣犯者過去受毒蛇食心地獄罪第七戒者不得妄言綺語惡口兩舌罵詈尊親毀辱師長善言惡對轉爲怨讎犯者過去受鎔銅灌口地獄罪第八誡者不得行邪心曲躭婬愛色執著生迷離他恩愛奪人寵念隔絕他家犯者過去受抱銅柱地獄罪第九戒者不得慳貪恡惜財物自求饒益嫉妬他人呪詛一切更相猜忌彼此怨深犯者過去受鐵輪地獄罪第十戒者不得破齋破戒不孝不仁偷竊齋食隱沒廚供令彼功德使不周圓犯者過去受運石培山地獄罪第十一戒者不得毀拆尊像偷竊幡花自將供養充衣裳臥具犯者過去受臥鐵床地獄罪第十二戒者不得見功德破壞屋舍傾崩不好修營心懷虛過犯者過去受劍林割切身心地獄罪第十三誡者不得因到人家見他有物便卽貸借方便不還羅織貧窮非理逼奪犯者過去受寒冰地獄罪第十四戒者不得見人有憂心生歡喜見人苦惱心卽快他見人有財常思下脫見人好心常自憎嫌犯者過去受鐵釘釘身身生猛火地獄罪第十五戒者不得不洗手漱口直進道場侵觸經像穢污靈文心不恭敬多生懶慢犯者過去受鐵杖亂考地獄罪第十六誡者不得探巢破卵傷胎墮子非理枉橫截斷生路犯者過去受大石壓身地獄罪第十七戒者不得裸形露體於天地日月星辰之下三明六昧之中犯者過去受鐵錐刺身地獄罪第十八戒者不得耗蠹常住攀摘花果損折園林穢污觀舍不生慚愧是輕福地犯者過去受吞鐵丸地獄罪第十九戒者不得雜食葷月星葱蒜韮薤身中臭穢神靈不居念誦修持觸犯靈聖犯者過去受吞火食炭地獄罪第二十戒者不得自以爲是非笑他家於諸法中橫起人我執心自著不見正眞犯者過去受磑磨碓擣地獄罪第二十一誡者不得將諸毒藥方便施人損他性命每結怨嫌犯者過去受百毒惡汁灌煮身心地獄罪第二十二戒者不得計筭三寶離隔六親不念捨施唯求自饒言作兩心不行一信犯者過去受拔舌地獄罪第二十三戒者不得將齋食就葷辛酒肉相和共食不敬齋法諸天罰人犯者過去受鐵鎖鎖身不得託生地獄罪第二十四戒者不得自倚豪强欺誘貧賤離拆男女不信天眞生兩見心不斷人我自行非去不識罪因犯者過去受鋸解身心地獄罪太極眞人又曰此二十四門戒者身之大患犯者鋒刀萬劫常考生魂凡人或遍身楚痛或身自青赤心懷憂愁此是生魂冥司將考當須各隨力分燒香入齋行道禮懺持心受誡念无上天尊布施然燈廣造功德更無再犯其罪必除眞人又曰凡欲學道先須齋戒洗心防患持戒功德多於微塵微塵之數見而可量齋戒之功无窮无盡一人持戒九祖生天合家蒙恩臨難分解縱盡家產已將布施還須持此戒經若學道不持此戒終各不成就能持此戒者卽有諸天帝王天眞大聖神仙玉女无極世界一切靈司燒香然燈證持戒者得福无量尅成道眞諸天香花因便迎接必將此輩隨願往生若善男子善女人聞此戒經心生歡喜惡業便除能捨慳貪將清淨財贖所傳經戒發起回向持心精勤若爲亡人臨送之夜或經初七乃至終七持誦此戒卽得魂飛淨境託生天堂懷姙婦人聞此戒經臨難分解若爲已身厄難消除苦緣闔家得福无量戒約煩惱隔絕魔心努力勤修早求解脫諸天同唱而說偈言一切修學人誓願成眞道慈悲念誡文隨聲斷煩惱永離生死苦得成无上道歸心向正眞紅顏不衰老太極眞人說二十四門戒經終
