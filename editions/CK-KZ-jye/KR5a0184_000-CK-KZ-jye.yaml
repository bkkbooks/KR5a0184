front:
  text: 爾時元始天尊先天地生布炁十方成就萬象人天之主河嶽之君日月因之以運行四時稟之以成像作修道梯航爲生死津梁出有入无應時方便隨緣設教濟度蒼生爲作法身周徧天下成一切智起無邊心或作帝王身或作宰官身或作郎吏身或作出家身或作法師身或作龍王身或作男子身或作女人身或作乞士身或作下賤身種種形變隨順世間肉眼凡夫不能見我以不識故多生顛倒是非人我貪癡因隨愛欲生從執著起便生地獄結成𡨚家從生至生從劫至劫不曾覺悟正念身心未入定源起離虛假沈淪惡道漂浪愛河被業風吹豈能正定三業自種十惡心生於正法中盡作分别永沈苦海解脫無緣常念眾生苦惱無量我今傳戒止惡防愆能自依行是成道果太極眞人又曰我前五百生中發念修道見一切法無非眞法何以故不以假見故知一切法無有非眞何以故以眞知故故知假者見假眞者見眞但作眞心卽是眞智眞不離假變假還眞假不離眞妄眞成假但能斷假歸眞戒成如說奉行晝夜讀誦自無地獄皆證天堂凡念戒時每月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日月小卻取二十七日此名十直齋日立春日春分日立夏日夏至日立秋日秋分日立冬日冬至日此名八節齋日正月十五日七月十五日十月十五日此名三元齋日正月一日四月一日七月一日十月一日此名四始齋日正月七日七月七日十月五日此名三會齋日如此等日同業共行修道戒人或少或多同居靜室清齋讚唱念戒燒香或在觀中名爲福地掃洒房院卽是玄壇能屈法師誦我妙戒燒眾妙香是時卽有左右官使者三十二天眞仙帝君十方靈官五嶽將吏九州社令山林孟長水府靈祇十二溪女飛天神王諸天童子無鞅數眾一時同會念誡之所錄其功德記發心人當必爲之削除罪業若能堅固抄寫受持每能念之劫劫生生不墮地獄眞人說諸戒偈我今眾等深心慚愧各各受持唯願戒師時時爲說第一戒者不得殺生割斷他命煎煑美味以饒一身或自殺教
  hash: sha256:aa37e939e6a0d17aca877c158b4f6c4884e381e9dadeff8c29f0e5d41cb80350
