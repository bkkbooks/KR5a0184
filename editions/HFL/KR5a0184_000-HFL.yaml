front:
  text: 太極真人說二十四門戒經爾時元始天尊先天地生布炁十方成就萬象人天之主河嶽之君日月因之以運行四時禀之以成像作修道梯航爲生死津梁出有入无應時方便隨縁設教濟度蒼生爲作法身周徧天下成一切智起無邊心或作帝王身或作宰官身或作郎吏身或作出家身或作法師身或作龍王身或作男子身或作女人身或作乞士身或作下賤身種種形變隨順世間肉眼凡夫不能見我以不識故多生顛倒是非人我貪癡因隨愛欲生從執著起便生地獄結成𡨚家從生至生從劫至劫不曽覺悟正念身心未入定源起離虚假沈淪惡道漂浪愛河被業風吹豈能正定三業自種十惡心生於正法中盡作分别永沈苦悔解脫無縁常念衆生苦惱無量我今傳戒止惡防愆能自依行是成道果太極真人又曰我前五百生中發念修道見一切法無非真法何以故不以假見故知一切法無有非真何以故以真知故故知假者見假眞者見真但作真心即是真智真不離假變假還真假不離真妄真成假但能斷假歸真戒成如說奉行晝夜讀誦自無地獄皆證天堂凡念戒時毎月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日月小却取二十七日此名十直齋日立春日春分日立夏日夏至日立秋日秋分日立冬日冬至日此名八節齋日正月十五日七月十五日十月十五日此名三元齋日正月一日四月一日七月一日十月一日此名四始齋日正月七日七月七日十月五日此名三㑹齋日如此等日同業共行修道戒人或少或多同居靜室清齋讃唱念誡燒香或在觀中名爲福地掃洒房院即是玄壇能屈法師誦我妙誡燒衆妙香是時即有左右官使者三十二天真仙帝君十方靈官五嶽將吏九州社今山林孟長水府靈祇十二溪女飛天神王諸天童子無鞅數衆一時同㑹念誡之所録其功德記發心人當必爲之削除罪業若能堅固抄寫受持毎能念之劫劫生生不墮地獄真人說諸戒偈我今衆等深心慚愧各各受持唯願戒師時時爲說苐一誡者不得殺生割斷他命煎煑美味以
