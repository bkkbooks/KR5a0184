body:
  text: 饒一身或自殺教他殺見殺隨喜噉食衆生犯者過去受鑊湯地獄罪苐二誡者不得偷盜取非義財夜入人家晝窺園圃承其便勢遂起賊心或自偷教人偷見偷隨喜犯者過去受刀山劒𣗳地獄罪第三誡者不得心懷隂謀枉䧟良善見人勝巳便欲害他計較不平自求饒益他好我認我惡怨他犯者過去受爐炭地獄罪第四誡者不得口是心非闘亂親戚談說三寳䜛謗出家走作唇舌非𥬇良善誹謗聖教疑惑兩心說語不平勸生分别犯者過去受鐵犂耕舌地獄罪第五誡者不得違經慢道欺誘他人敗壞靈壇侵損常住隱没功德踐踏福地犯者過去受剉碓剉身地獄罪第六誡者不得飲酒醉亂心神凶横無度不存禮樂喧悖尊親呌喚神靈驚心損氣犯者過去受毒蛇食心地獄罪第七誡者不得妄言綺語惡口兩舌罵詈尊親毀辱師長善言惡對轉爲怨讎犯者過去受鎔銅灌口地獄罪第八誡者不得行邪心曲躭婬愛色執著生迷離他恩愛奪人寵念隔絶他家犯者過去受抱銅柱地獄罪第九誡者不得慳貪恡惜財物自求饒益𡜍妬他人呪詛一切更相猜忌彼此怨深犯者過去受鐵輪地獄罪第十誡者不得破齋破戒不孝不仁偷𥨸齋食隱没廚供令彼功德使不周圓犯看過去受運石培山地獄罪第十一誡者不得毀拆尊像偷𥨸幡花自將供養充衣裳卧具犯者過去受卧鐵床地獄罪第十二誡者不得見功德破壞屋舍傾崩不好修營心懷虚過犯者過去受劒林割切身心地獄罪第十三誡者不得因到人家見他有物便即貸借方便不還羅織貧窮非理逼奪犯者過去受寒氷地獄罪第十四誡者不得見人有憂心生歡喜見人苦惱心即快他見人有財常思下脫見人好心常自憎嫌犯者過去受鐵釘釘身身生猛火地獄罪第十五誡者不得不洗手漱口直進道場侵觸經像穢汚靈文心不恭敬多生懶慢犯者過去受鐵杖亂考地獄罪第十六誡者不得探巢破卵傷胎墮子非理枉横截斷生路犯者過去受大石壓身地獄罪第十七誡者不得裸形露體於天地日月星辰之下三明六昧之中犯者過去受䥫錐剌身地獄罪第十八誡者不得耗蠹常住攀摘花果損折園林穢汚觀舍不生慚愧是輕福地犯者過去受吞鐵丸地獄罪第十九誡者不得雜食葷辛葱蒜韮薤身中臭穢神靈不居念誦修持觸犯靈聖犯者過去受吞火食炭地獄罪第二十誡者不得自以爲是非笑他家於諸法中横起人我執心自著不見正真犯者過去受磑磨碓擣地獄罪第二十一誡者不得將諸毒藥方便施人損他性命毎結怨嫌犯者過去受百毒惡汁灌煑身心地獄罪第二十二誡者不得計筭三寳離隔六親不念捨施唯求自饒言作兩心不行一信犯者過去受㧞舌地獄罪第二十三誡者不得將齋食就葷辛酒肉相和共食不敬齋法諸天罰人犯者過去受鐵鎻鎻身不得託生地獄罪第二十四誡者不得自倚豪强欺誘貧賤離拆男女不信天真生兩見心不斷人我自行非去不識罪因犯者過去受鋸解身心地獄罪太極真人又曰此二十四門誡者身之大患犯者鋒刀萬劫常考生魂凡人或遍身楚痛或身自青赤心懷憂愁此是生魂𡨋司將考當須各隨力分燒香入齋行道禮懴持心受誡念无上天尊布施然燈廣造功德更無再犯其罪必除真人又曰几欲學道先須齋戒洗心防患持戒功德多於微塵微塵之數見而可量齋戒之功无窮无盡一人持戒九祖生天合家蒙恩臨難分解縱盡家産巳將布施還須持此戒經若學道不持此戒終各不成就能持此戒者即有諸天帝王天真大聖神仙玉女无極世界一切靈司燒香然燈證持戒者得福无量尅成道真諸天香花因便迎接必將此軰隨願徃生若善男子善女人聞此戒經心生歡喜惡業便除能捨慳貪將清淨財贖所傳經戒發起回向持心精勤若爲亡人臨送之夜或經初七乃至終七持誦此戒即得魂飛淨境託生天堂懷姙婦人聞此戒經臨難分解若爲巳身厄難消除苦縁闔家得福无量戒約煩惱隔絶魔心努力勤修早求解脫諸天同唱而說偈言一切修學人誓願成真道慈悲念誡文隨聲斷煩惱永離生死苦得成无上道歸心向正真紅顔不衰老太極真人說二十四門戒經終
